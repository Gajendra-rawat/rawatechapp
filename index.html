<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RawaTech</title>
  <meta name="theme-color" content="#2d3a1e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RawaTech">
  <link rel="manifest" href="manifest.json">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;width:100%;overflow:hidden;}
    body{
      background:linear-gradient(135deg,#0a1628 0%,#0d2045 100%);
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      font-family:'Segoe UI',sans-serif;
      min-height:100vh;
    }
    .bg{position:fixed;inset:0;overflow:hidden;z-index:0;}
    .blob{position:absolute;border-radius:50%;filter:blur(60px);opacity:0.15;animation:blobMove 10s ease-in-out infinite;}
    .b1{width:400px;height:400px;background:#1e90ff;top:-100px;left:-100px;animation-delay:0s;}
    .b2{width:300px;height:300px;background:#00bfff;bottom:-80px;right:-80px;animation-delay:3s;}
    .b3{width:200px;height:200px;background:#4169e1;top:50%;left:60%;animation-delay:6s;}
    @keyframes blobMove{0%,100%{transform:scale(1) translate(0,0);}50%{transform:scale(1.2) translate(20px,-20px);}}

    .card{
      position:relative;z-index:10;
      display:flex;flex-direction:column;
      align-items:center;text-align:center;
      padding:40px 30px;
    }

    /* Logo Ring */
    .logo-ring{
      width:140px;height:140px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      margin-bottom:28px;position:relative;
      animation:ringPulse 3s ease-in-out infinite;
    }
    .logo-ring::before{
      content:'';position:absolute;inset:-4px;border-radius:50%;
      background:conic-gradient(#1e90ff 0%,#00bfff 25%,#0a1628 50%,#1e90ff 75%,#00bfff 100%);
      animation:spin 3s linear infinite;z-index:-1;
    }
    .logo-ring::after{
      content:'';position:absolute;inset:-8px;border-radius:50%;
      background:conic-gradient(rgba(30,144,255,0.3) 0%,transparent 60%);
      animation:spin 6s linear infinite reverse;z-index:-2;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes ringPulse{
      0%,100%{box-shadow:0 0 30px rgba(30,144,255,0.3),0 0 60px rgba(30,144,255,0.1);}
      50%{box-shadow:0 0 50px rgba(30,144,255,0.5),0 0 100px rgba(30,144,255,0.2);}
    }
    .logo-img{
      width:130px;height:130px;border-radius:50%;
      object-fit:cover;border:3px solid rgba(255,255,255,0.1);
    }
    .logo-fallback{
      width:130px;height:130px;border-radius:50%;
      background:linear-gradient(135deg,#1e3a8a,#1e90ff);
      display:none;align-items:center;justify-content:center;
      font-size:60px;font-weight:900;color:white;
      font-family:'Arial Black',sans-serif;
    }

    /* Brand */
    .brand{font-size:30px;font-weight:900;letter-spacing:2px;margin-bottom:4px;font-family:'Arial Black',sans-serif;}
    .rawa{color:white;}
    .tech{color:#1e90ff;}
    .solutions{font-size:10px;color:rgba(255,255,255,0.35);letter-spacing:5px;text-transform:uppercase;margin-bottom:44px;}

    /* Progress */
    .progress-wrap{width:220px;}
    .progress-bg{width:100%;height:3px;background:rgba(255,255,255,0.08);border-radius:10px;overflow:hidden;margin-bottom:14px;}
    .progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#1e90ff,#00bfff,#1e90ff);background-size:200%;border-radius:10px;transition:width 0.5s ease;animation:shimmer 2s linear infinite;}
    @keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
    .progress-text{font-size:11px;color:rgba(255,255,255,0.3);letter-spacing:1.5px;text-transform:uppercase;}

    /* Install Banner — BOTTOM */
    #pwaBar{
      display:none;position:fixed;
      bottom:0;left:0;right:0;
      background:linear-gradient(135deg,#1e3a8a,#1565c0);
      padding:14px 16px;z-index:99999;
      box-shadow:0 -6px 30px rgba(0,0,0,0.5);
      animation:slideUp 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
    .pwa-row{display:flex;align-items:center;gap:12px;max-width:500px;margin:0 auto;}
    .pwa-icon{font-size:32px;flex-shrink:0;}
    .pwa-info{flex:1;}
    .pwa-title{font-size:14px;font-weight:800;color:white;letter-spacing:0.5px;}
    .pwa-sub{font-size:11px;color:rgba(255,255,255,0.7);margin-top:3px;}
    .pwa-install-btn{
      background:white;color:#1e3a8a;
      border:none;padding:10px 18px;
      border-radius:25px;font-weight:900;
      font-size:13px;cursor:pointer;
      flex-shrink:0;letter-spacing:0.5px;
      box-shadow:0 4px 15px rgba(0,0,0,0.2);
    }
    .pwa-close{
      background:rgba(255,255,255,0.15);border:none;
      color:white;width:30px;height:30px;
      border-radius:50%;cursor:pointer;font-size:15px;
      flex-shrink:0;display:flex;align-items:center;justify-content:center;
    }

    /* iOS */
    #iosBox{
      display:none;position:fixed;bottom:16px;left:12px;right:12px;
      background:white;border-radius:16px;padding:18px 16px 14px;
      box-shadow:0 15px 50px rgba(0,0,0,0.3);z-index:99999;
      animation:slideUp 0.4s ease;
    }
    .ios-t{font-size:15px;font-weight:800;color:#1e3a8a;margin-bottom:12px;}
    .ios-s{font-size:13px;color:#444;margin:7px 0;display:flex;align-items:center;gap:8px;}
    .ios-x{position:absolute;top:10px;right:12px;background:#f0f0f0;border:none;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px;}
  </style>
</head>
<body>
<div class="bg">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
</div>

<div class="card">
  <div class="logo-ring">
    <img class="logo-img" id="logoImg"
      src="logo.png"
      onerror="this.style.display='none';document.getElementById('logoFb').style.display='flex';"
      alt="RawaTech">
    <div class="logo-fallback" id="logoFb">R</div>
  </div>
  <div class="brand"><span class="rawa">Rawa</span><span class="tech">Tech</span></div>
  <div class="solutions">— Solutions —</div>
  <div class="progress-wrap">
    <div class="progress-bg"><div class="progress-fill" id="pbar"></div></div>
    <div class="progress-text" id="ptxt">Loading...</div>
  </div>
</div>

<!-- PWA Install Banner -->
<div id="pwaBar">
  <div class="pwa-row">
    <div class="pwa-icon">📲</div>
    <div class="pwa-info">
      <div class="pwa-title">RawaTech App Install Karein</div>
      <div class="pwa-sub">Home screen pe add karein — bilkul native app!</div>
    </div>
    <button class="pwa-install-btn" id="pwaBtn">INSTALL</button>
    <button class="pwa-close" onclick="document.getElementById('pwaBar').style.display='none'">✕</button>
  </div>
</div>

<!-- iOS Hint -->
<div id="iosBox">
  <button class="ios-x" onclick="document.getElementById('iosBox').style.display='none'">✕</button>
  <div class="ios-t">📲 iPhone Par Install Karein</div>
  <div class="ios-s">1️⃣ Safari mein Share <b>⬆️</b> button tap karein</div>
  <div class="ios-s">2️⃣ <b>"Add to Home Screen"</b> select karein</div>
  <div class="ios-s">3️⃣ <b>"Add"</b> tap karein — Done! ✅</div>
</div>

<script>
  var APP_URL = "https://script.google.com/macros/s/AKfycbwbRnQJVKe_dD-04eij5lwDSXuvk_cllFJZ0crpkBPiAFkWg1-YrKJ7fp0MrqwjJ9G9gg/exec";

  var pbar = document.getElementById('pbar');
  var ptxt = document.getElementById('ptxt');

  // Progress animation
  var steps = [
    {w:'20%', t:'Connecting...',   ms:200},
    {w:'50%', t:'Loading data...', ms:600},
    {w:'80%', t:'Almost ready...', ms:1100},
    {w:'100%',t:'Welcome! 🎉',     ms:1600},
  ];
  steps.forEach(function(s){
    setTimeout(function(){ pbar.style.width=s.w; ptxt.textContent=s.t; }, s.ms);
  });

  // Redirect after splash
  setTimeout(function(){
    window.location.replace(APP_URL);
  }, 2100);

  // PWA Install prompt capture
  var deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', function(e){
    e.preventDefault();
    deferredPrompt = e;
    // Banner 1 second baad dikhao
    setTimeout(function(){
      var standalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
      if(!standalone){
        document.getElementById('pwaBar').style.display = 'block';
      }
    }, 1000);
  });

  document.getElementById('pwaBtn').addEventListener('click', function(){
    if(deferredPrompt){
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(function(r){
        document.getElementById('pwaBar').style.display='none';
        deferredPrompt=null;
        if(r.outcome==='accepted'){
          // Installed! Ab directly open karega
          setTimeout(function(){ window.location.replace(APP_URL); }, 500);
        }
      });
    }
  });

  // iOS hint
  var isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
  var isStandalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;
  if(isIos && !isStandalone){
    setTimeout(function(){ document.getElementById('iosBox').style.display='block'; }, 1500);
  }

  // Service Worker
  if('serviceWorker' in navigator){
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('sw.js').catch(function(){});
    });
  }
</script>
</body>
</html>
